<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso - SQL/NoSQL Validator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: var(--bg-primary);
      margin: 0;
    }
    .auth-container {
      background: var(--bg-secondary);
      padding: 40px;
      border-radius: var(--radius);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      width: 100%;
      max-width: 400px;
      border: 1px solid var(--border);
    }
    .auth-header {
      text-align: center;
      margin-bottom: 30px;
    }
    .auth-header .logo-icon { font-size: 32px; display: block; margin-bottom: 10px; }
    .auth-header h1 { font-size: 20px; color: var(--text-bright); margin: 0; }
    .auth-header p { font-size: 13px; color: var(--text-muted); margin-top: 5px; }
    
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; font-weight: 500; }
    .form-group input {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
      transition: border-color var(--t-fast);
      box-sizing: border-box;
    }
    .form-group input:focus { border-color: var(--clr-accent); }
    
    .btn-auth {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--clr-accent), #005ba1);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--t-fast);
      margin-top: 10px;
    }
    .btn-auth:hover { background: linear-gradient(135deg, #1a8cff, #0069ba); transform: translateY(-1px); }
    
    .auth-switch {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .auth-switch a { color: var(--clr-accent); text-decoration: none; font-weight: 500; cursor: pointer; }
    .auth-switch a:hover { text-decoration: underline; }
    
    .auth-error {
      background: rgba(244,71,71,0.1);
      border: 1px solid rgba(244,71,71,0.3);
      color: var(--clr-error);
      padding: 10px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }
  </style>
</head>
<body class="theme-dark">

  <div class="auth-container">
    <div class="auth-header">
      <span class="logo-icon">⚡</span>
      <h1 id="auth-title">Iniciar Sesión</h1>
      <p>SQL/NoSQL Syntax Validator</p>
    </div>

    <div id="error-message" class="auth-error"></div>

    <form id="auth-form">
      <div class="form-group" id="name-group" style="display: none;">
        <label for="name">Nombre</label>
        <input type="text" id="name" placeholder="Tu nombre">
      </div>
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" required placeholder="correo@ejemplo.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
      </div>
      <button type="submit" class="btn-auth" id="submit-btn">Ingresar</button>
    </form>

    <div class="auth-switch">
      <span id="switch-text">¿No tienes cuenta?</span> 
      <a id="switch-mode">Regístrate aquí</a>
    </div>
  </div>

  <script>
    let isLogin = true;

    document.getElementById('switch-mode').addEventListener('click', () => {
      isLogin = !isLogin;
      document.getElementById('auth-title').textContent = isLogin ? 'Iniciar Sesión' : 'Registrarse';
      document.getElementById('submit-btn').textContent = isLogin ? 'Ingresar' : 'Crear Cuenta';
      document.getElementById('switch-text').textContent = isLogin ? '¿No tienes cuenta?' : '¿Ya tienes cuenta?';
      document.getElementById('switch-mode').textContent = isLogin ? 'Regístrate aquí' : 'Inicia sesión';
      document.getElementById('name-group').style.display = isLogin ? 'none' : 'block';
      if(!isLogin) { document.getElementById('name').required = true; }
      else { document.getElementById('name').required = false; }
      document.getElementById('error-message').style.display = 'none';
    });

    document.getElementById('auth-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('error-message');
      const btn = document.getElementById('submit-btn');
      
      errorEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Cargando...';

      const endpoint = isLogin ? '/api/auth/login' : '/api/auth/register';
      const bodyPayload = isLogin ? { email, password } : { name, email, password };

      try {
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(bodyPayload)
        });

        const data = await res.json();

        if (res.ok) {
          localStorage.setItem('validator_token', data.token);
          localStorage.setItem('validator_user', data.user.name);
          localStorage.setItem('validator_role', data.user.role);
          window.location.href = '/';
        } else {
          errorEl.textContent = data.error || 'Error de autenticación';
          errorEl.style.display = 'block';
        }
      } catch (err) {
        errorEl.textContent = 'No se pudo conectar al servidor';
        errorEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = isLogin ? 'Ingresar' : 'Crear Cuenta';
      }
    });

    // Redirigir si ya está logueado
    if (localStorage.getItem('validator_token')) {
      window.location.href = '/';
    }
  </script>
</body>
</html>

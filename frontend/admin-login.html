<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso Administrador - SQL/NoSQL Validator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: var(--bg-primary);
      margin: 0;
    }
    .auth-container {
      background: var(--bg-secondary);
      padding: 40px;
      border-radius: var(--radius);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      width: 100%;
      max-width: 400px;
      border: 1px solid var(--border);
    }
    .auth-header {
      text-align: center;
      margin-bottom: 30px;
    }
    .auth-header .logo-icon { font-size: 32px; display: block; margin-bottom: 10px; color: var(--clr-accent-2); }
    .auth-header h1 { font-size: 20px; color: var(--text-bright); margin: 0; }
    .auth-header p { font-size: 13px; color: var(--text-muted); margin-top: 5px; }
    
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; font-weight: 500; }
    .form-group input {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
      transition: border-color var(--t-fast);
      box-sizing: border-box;
    }
    .form-group input:focus { border-color: var(--clr-accent-2); }
    
    .btn-auth {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--clr-accent-2), #5b21b6);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--t-fast);
      margin-top: 10px;
    }
    .btn-auth:hover { background: linear-gradient(135deg, #a78bfa, #7c3aed); transform: translateY(-1px); }
    
    .auth-error {
      background: rgba(244,71,71,0.1);
      border: 1px solid rgba(244,71,71,0.3);
      color: var(--clr-error);
      padding: 10px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }
  </style>
</head>
<body class="theme-dark">

  <div class="auth-container">
    <div class="auth-header">
      <span class="logo-icon">🛡️</span>
      <h1>Acceso Administrador</h1>
      <p>Panel de Control SQL/NoSQL</p>
    </div>

    <div id="error-message" class="auth-error"></div>

    <form id="admin-auth-form">
      <div class="form-group">
        <label for="email">Correo Electrónico (Admin)</label>
        <input type="email" id="email" required placeholder="admin@ejemplo.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
      </div>
      <button type="submit" class="btn-auth" id="submit-btn">Ingresar</button>
    </form>
    
    <div style="text-align: center; margin-top: 20px; font-size: 13px;">
      <a href="/login.html" style="color: var(--text-muted); text-decoration: none;">Volver al acceso normal</a>
    </div>
  </div>

  <script>
    document.getElementById('admin-auth-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('error-message');
      const btn = document.getElementById('submit-btn');
      
      errorEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Verificando...';

      try {
        const res = await fetch('/api/auth/admin-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.ok) {
          sessionStorage.setItem('admin_token', data.token);
          sessionStorage.setItem('admin_user', data.user.name);
          sessionStorage.setItem('admin_email', data.user.email);
          sessionStorage.setItem('admin_role', data.user.role);
          window.location.href = '/admin/dashboard';
        } else {
          errorEl.textContent = data.error || 'Credenciales inválidas';
          errorEl.style.display = 'block';
        }
      } catch (err) {
        errorEl.textContent = 'No se pudo conectar al servidor';
        errorEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Ingresar';
      }
    });

    if (sessionStorage.getItem('admin_token')) {
      window.location.href = '/admin/dashboard';
    }
  </script>
</body>
</html>
